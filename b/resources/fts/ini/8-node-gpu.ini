[global]
username:root
password:couchbase
port:8091
fts_port:8094

[membase]
rest_username:Administrator
rest_password:password

[servers]
1:_1
2:_2
3:_3
4:_4
5:_5
6:_6
7:_7
8:_8

# Provisioned with numnodes=8, gpu_count=3.
# cloud_provision.aws_get_servers returns CPU IPs first, GPU IPs last, so
# positions _1.._5 are CPU instances and _6.._8 are GPU instances.
# Vector pindexes on _4 and _5 run on CPU FAISS; _6.._8 run on GPU FAISS.

[_1]
ip:dynamic
services:kv

[_2]
ip:dynamic
services:kv

[_3]
ip:dynamic
services:kv

[_4]
ip:dynamic
services:fts

[_5]
ip:dynamic
services:fts

[_6]
ip:dynamic
services:fts,n1ql
data_path:/opt/dlami/nvme/cb-data

[_7]
ip:dynamic
services:fts
data_path:/opt/dlami/nvme/cb-data

[_8]
ip:dynamic
services:fts
data_path:/opt/dlami/nvme/cb-data