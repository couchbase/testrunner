eventing.eventing_encryption_at_rest.EventingEncryptionAtRest:
    #### Sanity and State Change Tests ####
    test_log_encryption_sanity,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger
    test_state_change_disabled_to_enabled,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger
    test_state_change_enabled_to_disabled,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger

    #### For Global Functions ####
    test_state_change_disabled_to_enabled,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,global_function_scope=True
    test_state_change_enabled_to_disabled,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,global_function_scope=True

    #### /getAppLog Endpoint Tests when Log Encryption is Enabled ####
    # Scoped function, single node
    test_get_app_log_with_encryption,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger
    # Global function, single node
    test_get_app_log_with_encryption,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,global_function_scope=True
    # Multi-node aggregate, scoped
    test_get_app_log_with_encryption,nodes_init=3,services_init=kv-eventing-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,aggregate=True
    # Size < 40MB
    test_get_app_log_with_encryption,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,size=1000000
    # Hit EOF (~40MB)
    test_get_app_log_with_encryption,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,size=4194304
    # Very large size
    test_get_app_log_with_encryption,nodes_init=3,services_init=kv-eventing-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,size=3000000000,aggregate=True

    #### /getAppLog Log Encryption State Change Tests ####
    # Single node, default size
    test_get_app_log_state_change,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger
    # Single node, size covering only encrypted files
    test_get_app_log_state_change,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,size=1000000
    # Single node, size spanning mixed files
    test_get_app_log_state_change,nodes_init=2,services_init=kv-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,size=4194304
    # Multi-node aggregate with state change
    test_get_app_log_state_change,nodes_init=3,services_init=kv-eventing-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,aggregate=True
    # Multi-node aggregate, very large size
    test_get_app_log_state_change,nodes_init=3,services_init=kv-eventing-eventing,dataset=default,groups=simple,reset_services=True,handler_code=logger,size=3000000000,aggregate=True