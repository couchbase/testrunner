# GSI + Query Encryption-at-Rest Upgrade Tests
#
# 6-node cluster (kv-kv-index-index-n1ql-n1ql). Tests upgrade from an older
# build to a newer build and validate that:
#   * GSI on-disk files (shards, snapshots) are encrypted on the upgraded cluster
#   * Query completed-requests (rlstream.*), history (local_request_log.*),
#     FFDC dumps, and spill/backfill files are encrypted on the upgraded cluster
#   * Indexes are not lost across the upgrade
#   * Mixed-mode behaviour is correct: nodes on >= 8.1 encrypt GSI/Query files,
#     nodes still on older versions do not (even with bucket encryption on)
#
# Bucket encryption is managed by the test (not via enable_encryption_at_rest=True
# in conf) because the initial cluster may be pre-8.0 where the KEK endpoint
# does not exist.
#
# How the older build is actually installed
# -----------------------------------------
# Jenkins / scripts/new_install.py installs the TARGET upgrade build on every
# node first (so the cluster is reachable). Then testrunner is invoked with
# `combine_tests=True` (in -p) AND `initial_version=<old>` in the conf line below.
# basetestcase.py:318-322 sees `combine_tests=True` and re-installs each test's
# `initial_version` on every node during setUp, so the test actually starts on
# the old build. The test itself then orchestrates the per-node upgrade to
# `upgrade_to`.
#
# Required runtime params (-p):
#   upgrade_to=<build>          target Couchbase build e.g. 8.1.0-XXXX
#   combine_tests=True          enables the in-setUp install of initial_version
#
# Recommended runtime params (-p):
#   get-cbcollect-info=True     collect cbcollect on failure
#   java_sdk_client=True        rebuild the java sdk docker image
#   use_magma_loader=True       rebuild the magma docloader image
#   skip_cleanup=True           keep cluster around after the run for debug

gsi.gsi_query_encryption_at_rest_upgrade.GSIQueryEncryptionAtRestUpgrade:
