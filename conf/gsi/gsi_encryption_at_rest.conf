# GSI Encryption at Rest Tests
# Tests validate index creation and scans with encryption at rest enabled
# Supports both MOI (memory_optimized) and Plasma (forestdb) storage types
# Uses gsi_util_obj patterns for index creation (similar to gsi_file_based_rebalance.py)

gsi.gsi_encryption_at_rest.GSIEncryptionAtRest:
    # ============================================================================
    # SANITY TESTS
    # ============================================================================
    # Single bucket with encryption
    test_gsi_encryption_at_rest_sanity,nodes_init=3,services_init=kv:n1ql-index-index,gsi_type=memory_optimized,enable_encryption_at_rest=True,skip_bucket_setup=True,num_of_docs_per_collection=10000,json_template=Hotel,num_index_replica=1,GROUP=P0

    # Multi-bucket - both buckets encrypted
    test_gsi_encryption_at_rest_sanity,nodes_init=3,services_init=kv:n1ql-index-index,gsi_type=memory_optimized,enable_encryption_at_rest=True,skip_bucket_setup=True,bucket_count=2,encrypt_all_buckets=True,num_of_docs_per_collection=10000,json_template=Hotel,num_index_replica=1,GROUP=P0

    # Multi-bucket - one encrypted, one not
    test_gsi_encryption_at_rest_sanity,nodes_init=3,services_init=kv:n1ql-index-index,gsi_type=memory_optimized,enable_encryption_at_rest=True,skip_bucket_setup=True,bucket_count=2,encrypt_all_buckets=False,num_of_docs_per_collection=10000,json_template=Hotel,num_index_replica=1,GROUP=P0

    # ============================================================================
    # KEY ROTATION TESTS
    # Tests rotating from one KEK to another KEK (different key ID)
    # ============================================================================
    # Single bucket - key rotation
    test_gsi_encryption_at_rest_key_rotation,nodes_init=3,services_init=kv:n1ql-index-index,gsi_type=memory_optimized,enable_encryption_at_rest=True,skip_bucket_setup=True,num_of_docs_per_collection=10000,json_template=Hotel,num_index_replica=1,GROUP=P0

    # Multi-bucket - both buckets encrypted, key rotation
    test_gsi_encryption_at_rest_key_rotation,nodes_init=3,services_init=kv:n1ql-index-index,gsi_type=memory_optimized,enable_encryption_at_rest=True,skip_bucket_setup=True,bucket_count=2,encrypt_all_buckets=True,num_of_docs_per_collection=10000,json_template=Hotel,num_index_replica=1,GROUP=P1

    # Multi-bucket - one encrypted, one not, key rotation
    test_gsi_encryption_at_rest_key_rotation,nodes_init=3,services_init=kv:n1ql-index-index,gsi_type=memory_optimized,enable_encryption_at_rest=True,skip_bucket_setup=True,bucket_count=2,encrypt_all_buckets=False,num_of_docs_per_collection=10000,json_template=Hotel,num_index_replica=1,GROUP=P1

    # ============================================================================
    # FORCE RE-ENCRYPTION TESTS
    # Tests dropping DEKs and re-encrypting data with new DEKs (same KEK ID)
    # ============================================================================
    # Single bucket - force re-encryption
    test_gsi_encryption_at_rest_force_reencryption,nodes_init=3,services_init=kv:n1ql-index-index,gsi_type=memory_optimized,enable_encryption_at_rest=True,skip_bucket_setup=True,num_of_docs_per_collection=10000,json_template=Hotel,num_index_replica=1,GROUP=P0

    # Multi-bucket - both buckets encrypted, force re-encryption
    test_gsi_encryption_at_rest_force_reencryption,nodes_init=3,services_init=kv:n1ql-index-index,gsi_type=memory_optimized,enable_encryption_at_rest=True,skip_bucket_setup=True,bucket_count=2,encrypt_all_buckets=True,num_of_docs_per_collection=10000,json_template=Hotel,num_index_replica=1,GROUP=P1

    # Multi-bucket - one encrypted, one not, force re-encryption
    test_gsi_encryption_at_rest_force_reencryption,nodes_init=3,services_init=kv:n1ql-index-index,gsi_type=memory_optimized,enable_encryption_at_rest=True,skip_bucket_setup=True,bucket_count=2,encrypt_all_buckets=False,num_of_docs_per_collection=10000,json_template=Hotel,num_index_replica=1,GROUP=P1
