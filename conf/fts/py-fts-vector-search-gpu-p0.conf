    # set3 — mixed CPU + GPU FTS topology coverage.
    #
    # Requires a separate Jenkins job with numnodes=8, gpu_count=3 and ini
    # b/resources/fts/ini/8-node-gpu.ini. cloud_provision.aws_get_servers
    # orders CPU IPs first then GPU IPs, so the 8 provisioned nodes land as
    # [CPU, CPU, CPU, CPU, CPU, GPU, GPU, GPU]. Cluster D,D,D,F,F,F+Q,F,F
    # then yields:
    #   _1.._3 (CPU) = KV
    #   _4, _5 (CPU) = FTS  ← CPU-FTS, runs vector pindexes on CPU FAISS
    #   _6     (GPU) = FTS + N1QL (query coordinator)
    #   _7, _8 (GPU) = FTS  ← GPU-FTS, runs vector pindexes on GPU FAISS
    #
    # num_partitions=20-30 with index_replicas=2-3 gives the FTS planner
    # ~40-120 placements to spread across 5 nodes so both CPU-FTS and GPU-FTS
    # get vector pindexes. Mixed-hardware placement is confirmed working: the
    # planner treats gpu_index=True as "prefer GPU, accept CPU" and spreads
    # pindexes across all 5 FTS nodes (GPU FAISS on _6.._8, CPU FAISS on _4-_5).
    #
    # fts_quota=10240 (vs 20480 elsewhere) is required because the CPU-FTS
    # nodes at _4 and _5 are ~16GB t-series instances whose Couchbase
    # "max allowable" FTS quota is ~14.7GB. fts_quota is cluster-wide so it
    # must fit the smallest FTS node. GPU-FTS nodes then use 10GB instead of
    # 20GB on this set — acceptable since the per-test data volume
    # (vector_end_index=500000, dim 128) is well under that ceiling.

