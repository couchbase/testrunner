fts.vector_moving_topology_fts.VectorSearchMovingTopFTS:
    # set4 — GPU rebalance / failover / crash recovery (P0 topology coverage).
    #
    # Initial topology is 3 KV + 2 FTS (cluster=D,D,D,F+Q,F) using positions 1-5
    # of the 6-node-gpu.ini, leaving position 6 as a spare. Per the
    # CPU-first / GPU-last ordering in cloud_provision.aws_get_servers, all
    # three KV positions land on CPU instances and both FTS positions land on
    # GPU instances. The lone spare at position 6 is also a GPU instance.
    # rebalance_in adds that GPU spare; swap_rebalance swaps an FTS-GPU out
    # and the spare in. Failover and crash tests don't add nodes and run on
    # the 5-node initial cluster.
    #
    # 2 KV + 2 FTS would have been preferable for "topology under stress"
    # coverage, but with the current CPU-first provisioning order position 3
    # of D,D,F+Q,F lands on a CPU instance that can't fit fts_quota=20480
    # (max allowable on a 16GB CPU node is ~14764MB). Strict all-GPU FTS
    # placement constrains us to D,D,D,F+Q,F until set3 (mixed CPU+GPU)
    # introduces a provisioning shape with more GPU slots.
    #
    # num_partitions=4: 2 partitions per FTS node initially; spreads to ~1-2
    # per node after rebalance_in to 3 FTS nodes; concentrates on the survivor
    # during failover. index_replicas=1: every partition has a fallback copy
