fts.stable_topology_fts.StableTopFTS:

    # Deep pagination over non-textual content (numeric, datetime, geo)
    # Uses the emp dataset with salary (number), join_date (datetime), location (geopoint)
    # Requires Couchbase 8.1+ (search_after/search_before with prefix-coded types)

    # search_after with numeric sort
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric,partial_size=2,partial_start_index=3,GROUP=DEEP_PAG
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric,partial_size=2,partial_start_index=0,GROUP=DEEP_PAG
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric,partial_size=2,partial_start_index=5,GROUP=DEEP_PAG
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric,partial_size=3,partial_start_index=3,GROUP=DEEP_PAG,scoring_model=bm25

    # search_before with numeric sort
    test_deep_pagination_search_before_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric,partial_size=2,partial_start_index=3,GROUP=DEEP_PAG
    test_deep_pagination_search_before_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric,partial_size=2,partial_start_index=5,GROUP=DEEP_PAG
    test_deep_pagination_search_before_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric,partial_size=3,partial_start_index=4,GROUP=DEEP_PAG,scoring_model=bm25

    # search_after with datetime sort
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime,partial_size=2,partial_start_index=3,GROUP=DEEP_PAG
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime,partial_size=2,partial_start_index=0,GROUP=DEEP_PAG
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime,partial_size=2,partial_start_index=5,GROUP=DEEP_PAG
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime,partial_size=3,partial_start_index=3,GROUP=DEEP_PAG,scoring_model=bm25

    # search_before with datetime sort
    test_deep_pagination_search_before_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime,partial_size=2,partial_start_index=3,GROUP=DEEP_PAG
    test_deep_pagination_search_before_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime,partial_size=2,partial_start_index=5,GROUP=DEEP_PAG
    test_deep_pagination_search_before_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime,partial_size=3,partial_start_index=4,GROUP=DEEP_PAG,scoring_model=bm25

    # search_after with geo_distance sort
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=geo,partial_size=2,partial_start_index=3,GROUP=DEEP_PAG
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=geo,partial_size=2,partial_start_index=0,GROUP=DEEP_PAG
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=geo,partial_size=2,partial_start_index=5,GROUP=DEEP_PAG
    test_deep_pagination_search_after_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=geo,partial_size=3,partial_start_index=3,GROUP=DEEP_PAG,scoring_model=bm25

    # search_before with geo_distance sort
    test_deep_pagination_search_before_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=geo,partial_size=2,partial_start_index=3,GROUP=DEEP_PAG
    test_deep_pagination_search_before_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=geo,partial_size=2,partial_start_index=5,GROUP=DEEP_PAG
    test_deep_pagination_search_before_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=geo,partial_size=3,partial_start_index=4,GROUP=DEEP_PAG,scoring_model=bm25

    # full walk pagination (iterate all pages using decoded_sort)
    test_deep_pagination_full_walk_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric,page_size=5000,GROUP=DEEP_PAG
    test_deep_pagination_full_walk_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime,page_size=5000,GROUP=DEEP_PAG
    test_deep_pagination_full_walk_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=geo,page_size=5000,GROUP=DEEP_PAG
    test_deep_pagination_full_walk_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric,page_size=1000,GROUP=DEEP_PAG,scoring_model=bm25
    test_deep_pagination_full_walk_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime,page_size=1000,GROUP=DEEP_PAG
    test_deep_pagination_full_walk_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=geo,page_size=1000,GROUP=DEEP_PAG

    # multi-field sort with non-textual types
    test_deep_pagination_multi_sort_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric_geo,partial_size=2,partial_start_index=3,GROUP=DEEP_PAG
    test_deep_pagination_multi_sort_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime_numeric,partial_size=2,partial_start_index=3,GROUP=DEEP_PAG
    test_deep_pagination_multi_sort_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=numeric_geo,partial_size=3,partial_start_index=4,GROUP=DEEP_PAG,scoring_model=bm25
    test_deep_pagination_multi_sort_nontextual,cluster=D,F+Q,F+Q,items=100000,sort_type=datetime_numeric,partial_size=3,partial_start_index=4,GROUP=DEEP_PAG
