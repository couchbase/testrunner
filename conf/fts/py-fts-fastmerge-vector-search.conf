# ============================================================================
# FTS FastMerge Vector Search Test Suite
# Release: Totoro (8.1.0)
#
# Architecture:
#   No new test logic -- all tests reuse existing VectorSearch / BQVectorSearch
#   methods. FastMerge is enabled purely via `fastmerge=True` param which
#   injects `vector_index_fast_merge: true` into params.store at index creation.
#
#   Feature permutation design:
#   ------------------------------------------------------------------
#   | Feature      | Config level  | Param                           |
#   |--------------|---------------|---------------------------------|
#   | FastMerge    | params.store  | fastmerge=True                  |
#   | BQ           | per-field     | bq_index_type=bivf-sq8/bivf-flat|
#   | GPU          | per-field     | gpu=True  (future)              |
#   | Encryption   | cluster-level | cluster config (future)         |
#   ------------------------------------------------------------------
#   To add a new combo, just append params to existing conf entries.
#   Example: fastmerge=True,bq_index_type=bivf-sq8,gpu=True
#
# Dataset:
#   - VectorSearch tests: SIFT 1M (128-dim)
#   - BQ combo tests: 100k cars BAAI (1024-dim) via backup restore
# ============================================================================

# ===========================================================================
# SECTION 1: Existing VectorSearch tests re-run with fastmerge=True
#            (zero code duplication -- same test methods, different config)
# ===========================================================================

