fts.stable_topology_fts.StableTopFTS:

    # --- Lazy Index Update — MB-57888 (enableLazyIndexUpdate) ---
    # One generic test, run across the partition x topology matrix. Each line asserts:
    # updatable changes are selective (no rebuild) with no pindex movement and a
    # correct query-time short-circuit (incl. numeric sort), and non-updatable
    # changes still rebuild.

    # Single FTS node — single partition
    test_lazy_index_update,cluster=F,index_partitions=1,lazy_index_update=true,GROUP=P0;stable
    # Single FTS node — multi partition
    test_lazy_index_update,cluster=F,index_partitions=12,lazy_index_update=true,GROUP=P0;stable

    # Multi FTS node — single partition
    test_lazy_index_update,cluster=F,F,F,index_partitions=1,lazy_index_update=true,GROUP=P0;stable
    # Multi FTS node — multi partition (exercises the planner no-movement fix)
    test_lazy_index_update,cluster=F,F,F,index_partitions=12,lazy_index_update=true,GROUP=P0;stable
    # Multi FTS node — multi partition WITH replicas: full matrix test
    test_lazy_index_update,cluster=F,F,F,index_partitions=12,num_replicas=2,lazy_index_update=true,GROUP=P0;stable

    # Replicas: active + replica copies must both update selectively and not move
    # 6 partitions x (1 active + 2 replica) = 18 pindexes, 6 per node on 3 FTS nodes
    test_lazy_index_update_with_replicas,cluster=F,F,F,index_partitions=6,num_replicas=2,lazy_index_update=true,GROUP=P0;stable

    # Concurrent CRUD: short-circuit must hold for docs mutated during the change
    test_lazy_index_update_concurrent_crud,cluster=F,index_partitions=1,lazy_index_update=true,GROUP=P0;stable
    test_lazy_index_update_concurrent_crud,cluster=F,F,F,index_partitions=12,lazy_index_update=true,GROUP=P1;stable

fts.moving_topology_fts.MovingTopFTS:

    # --- Lazy Index Update during topology change (MB-57888) ---
    # Updatable change applied concurrently with a rebalance/failover; asserts the
    # index ends consistent after recovery (count, field search, short-circuit, sort).
    # FTS ops run 1 KV + 3 FTS (num_replicas=2) so failover/rebalance exercise replica
    # promotion; kv_rebalance keeps 2 KV (it rebalances a KV node out). Spare nodes in .ini.

    # Updatable change during FTS node rebalance out + in
    test_lazy_index_update_during_topology,cluster=D,F,F,F,topology_op=fts_rebalance,index_partitions=12,num_replicas=2,lazy_index_update=true,GROUP=moving
    # Updatable change during KV node rebalance out + in (needs 2 KV nodes)
    test_lazy_index_update_during_topology,cluster=D,D,F,F,topology_op=kv_rebalance,index_partitions=12,lazy_index_update=true,GROUP=moving
    # Updatable change during FTS node hard failover + full recovery (replica must promote)
    test_lazy_index_update_during_topology,cluster=D,F,F,F,topology_op=fts_failover,index_partitions=12,num_replicas=2,lazy_index_update=true,GROUP=moving
    # Updatable change during 2-node FTS swap rebalance (needs 2 spare FTS nodes in .ini)
    test_lazy_index_update_during_topology,cluster=D,F,F,F,topology_op=swap,index_partitions=12,num_replicas=2,lazy_index_update=true,GROUP=moving
