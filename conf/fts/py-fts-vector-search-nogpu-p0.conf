# ============================================================================
# 4-FEATURE PERMUTATION MATRIX -- no-GPU half (24 of 48)
#
# Companion to py-fts-vector-search-gpu-p0.conf (the GPU half). Together the two
# files cover the full 6 x 2 x 2 x 2 = 48-cell matrix:
#   (1) optimization type x (2) FastMerge x (3) Encryption-at-rest x (4) GPU.
#
#   - 6 optimization types: recall / latency / memory-efficient (non-BQ, via
#     vector_index_optimized_for on VectorSearch) + bivf-flat / bivf-sq8 / ivf,rabitq
#     (BQ, via bq_index_type on BQVectorSearch -> same vector_index_optimized_for field).
#   - FastMerge:  fastmerge=True (omit = off).
#   - Encryption: enable_encryption_at_rest=True (omit = off). basetestcase creates the
#     KEK; the matrix methods (test_basic_vector_search / test_bq_basic_knn_search) call
#     _enable_bucket_encryption_if_requested() after the bucket exists and before the FTS
#     index is built, so vector segments are written encrypted from the start.
#   - GPU: OFF for every cell here (no gpu_index param) -- this is the non-AWS / non-GPU
#     job. The GPU-ON cells live in py-fts-vector-search-gpu-p0.conf.
#
# Topology keeps each optimization type's native baseline (no GPU nodes required):
#   - non-BQ: SIFT 1M (128-dim), cluster=F+Q,F.
#   - BQ:     100k cars BAAI (1024-dim) via backup restore, cluster=D,D,F+Q,F+Q.
# 'ivf,rabitq' carries a comma (the conf separator) so it MUST be triple-quoted.
# BQ recall threshold: 70 with FastMerge off, 60 with FastMerge on (mirrors the existing
# bq / fastmerge confs). rabitq is newly merged -- its recall floor may need tuning.
# ============================================================================

