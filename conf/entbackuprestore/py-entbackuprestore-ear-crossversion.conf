ent_backup_restore.enterprise_backup_restore_test.EnterpriseBackupRestoreTest:
    # ---- G. Cross-version EaR tests (CV-001..010, CV-012) ----
    # NOTE: upgrade_cb defaults False — cross-version is driven by the cbbackupmgr binary swap.
    # old_cbm must be a version string (e.g. 8.0.0-3777) or a tools-package bin path.
    #
    # CV-001/002: legacy (unencrypted) backup → restore with new cbm
    test_ear_cross_version,scenario=legacy_restore,old_cbm=8.0.0-3777,upgrade_cb=False,items=1000,GROUP=EAR_CV;P0
    # CV-003: mixed chain — legacy full + encrypted incrementals
    test_ear_cross_version,scenario=mixed_chain,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,upgrade_cb=False,number_of_backups=3,items=1000,GROUP=EAR_CV;P0
    # CV-004: mixed archive — enc + unenc repos coexist
    test_ear_cross_version,scenario=mixed_archive,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,upgrade_cb=False,items=1000,GROUP=EAR_CV;P1
    # CV-005: mixed plans — legacy + new plan formats in same repo
    test_ear_cross_version,scenario=mixed_plans,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,upgrade_cb=False,number_of_backups=4,items=1000,GROUP=EAR_CV;P1
    # CV-006: merge across unencrypted + encrypted backups
    test_ear_cross_version,scenario=cross_enc_merge,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,upgrade_cb=False,number_of_backups=4,items=1000,GROUP=EAR_CV;P1
    # CV-007: directory layout — bucket-name vs UUID dirs by version
    test_ear_cross_version,scenario=dir_layout,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,upgrade_cb=False,items=1000,GROUP=EAR_CV;P1
    # CV-008: config version — v0 plaintext vs v>=1 encrypted
    test_ear_cross_version,scenario=config_version,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,include-buckets=default,upgrade_cb=False,items=1000,GROUP=EAR_CV;P1
    # CV-009: plan boundary — plan format version transition
    test_ear_cross_version,scenario=plan_boundary,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,upgrade_cb=False,items=1000,GROUP=EAR_CV;P2
    # CV-010: forward compat — old cbm reads new encrypted repo (expect graceful fail)
    test_ear_cross_version,scenario=forward_compat,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,upgrade_cb=False,items=1000,expected_error=unsupported,GROUP=EAR_CV;P1
    # Optional: same scenario WITH a CB cluster upgrade
    test_ear_cross_version,scenario=mixed_chain,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,upgrade_cb=True,number_of_backups=3,items=1000,GROUP=EAR_CV;P2
    # On cloud object store (CV-012)
    test_ear_cross_version,scenario=mixed_chain,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,upgrade_cb=False,objstore_provider=s3,number_of_backups=3,items=1000,GROUP=EAR_CV;P2

