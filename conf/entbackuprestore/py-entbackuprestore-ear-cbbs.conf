ent_backup_restore.backup_service_test.BackupServiceTest:
    # ---- M. Couchbase Backup Service EaR tests (FN-012, FN-013, CV-011, KM-007, TMP-007) ----
    # FN-012: Full end-to-end lifecycle (backup + incremental + restore) through CBBS
    test_ear_cbbs,cbbs_scenario=end_to_end,ear=True,ear_protection=passphrase,items=1000,GROUP=EAR_CBBS;P1
    # FN-013: Collect-logs on encrypted repo (via cbbackupmgr CLI)
    test_ear_cbbs,cbbs_scenario=collect_logs,ear=True,ear_protection=passphrase,items=1000,GROUP=EAR_CBBS;P2
    # CV-011: Upgrade — old unencrypted backup restored by new service
    test_ear_cbbs,cbbs_scenario=upgrade,old_cbm=8.0.0-3777,ear=True,ear_protection=passphrase,items=1000,GROUP=EAR_CBBS;P1
    # KM-007: Missing credentials — backup should fail cleanly
    test_ear_cbbs,cbbs_scenario=missing_creds,ear=True,ear_protection=passphrase,ear_omit_credentials=True,items=1000,expected_error=encryption credentials,GROUP=EAR_CBBS;P1
    # TMP-007: History file tamper detection
    test_ear_cbbs,cbbs_scenario=history_tamper,ear=True,ear_protection=passphrase,items=1000,GROUP=EAR_CBBS;P2