# MB-68340: XDCR Memory Throttler Test Suite
# Covers dcpFlowControlThrottle (range 5-100) and componentEventsChanLength (range 1000-10000)

############################################################################################
# SECTION 1 & 2: Boundary Value Tests [P0]
############################################################################################

xdcr.memoryTestXDCR.MemoryTestXDCR:

    # dcpFlowControlThrottle - Valid min/max boundaries
    test_boundary_value,dcpFlowControlThrottle=5,GROUP=P0;boundary
    test_boundary_value,dcpFlowControlThrottle=100,GROUP=P0;boundary

    # dcpFlowControlThrottle - Invalid values (below min, above max)
    test_boundary_value,dcpFlowControlThrottle=0,GROUP=P0;boundary
    test_boundary_value,dcpFlowControlThrottle=101,GROUP=P0;boundary

    # componentEventsChanLength - Valid min/max boundaries
    test_boundary_value,componentEventsChanLength=1000,GROUP=P0;boundary
    test_boundary_value,componentEventsChanLength=10000,GROUP=P0;boundary

    # componentEventsChanLength - Invalid values (below min, above max)
    test_boundary_value,componentEventsChanLength=999,GROUP=P0;boundary
    test_boundary_value,componentEventsChanLength=10001,GROUP=P0;boundary

    # Combined boundary test
    test_boundary_value,dcpFlowControlThrottle=5,componentEventsChanLength=1000,GROUP=P0;boundary

############################################################################################
# SECTION 3: Document Size Larger Than Buffer Size [P0]
############################################################################################

    # 1MB documents with throttle=50
    test_large_doc_replication,doc_size_bytes=1048576,num_docs=100,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P0;large_docs

    # 5MB documents with throttle=25
    test_large_doc_replication,doc_size_bytes=5242880,num_docs=50,dcpFlowControlThrottle=25,componentEventsChanLength=2500,GROUP=P0;large_docs

    # 10MB documents with minimal throttle
    test_large_doc_replication,doc_size_bytes=10485760,num_docs=20,dcpFlowControlThrottle=10,componentEventsChanLength=1000,GROUP=P0;large_docs

    # 20MB documents with throttle=50
    test_large_doc_replication,doc_size_bytes=20971520,num_docs=10,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P0;large_docs

############################################################################################
# SECTION 4: Memory Footprint Validation [P0]
############################################################################################

    # Baseline with throttle=100 (default)
    test_memory_footprint_baseline,doc_size_bytes=1024,num_docs=10000,dcpFlowControlThrottle=100,componentEventsChanLength=10000,heap_sample_duration_s=60,heap_sample_interval_s=5,max_pct_increase=50,GROUP=P0;memory

    # Throttle=75
    test_memory_footprint_baseline,doc_size_bytes=1024,num_docs=10000,dcpFlowControlThrottle=75,componentEventsChanLength=7500,heap_sample_duration_s=60,heap_sample_interval_s=5,max_pct_increase=50,GROUP=P0;memory

    # Throttle=50
    test_memory_footprint_baseline,doc_size_bytes=1024,num_docs=10000,dcpFlowControlThrottle=50,componentEventsChanLength=5000,heap_sample_duration_s=60,heap_sample_interval_s=5,max_pct_increase=50,GROUP=P0;memory

    # Throttle=25
    test_memory_footprint_baseline,doc_size_bytes=1024,num_docs=10000,dcpFlowControlThrottle=25,componentEventsChanLength=2500,heap_sample_duration_s=60,heap_sample_interval_s=5,max_pct_increase=50,GROUP=P0;memory

    # Combined low throttle with nozzle variations (Section 4.5)
    test_memory_footprint_baseline,doc_size_bytes=1024,num_docs=10000,dcpFlowControlThrottle=50,sourceNozzlePerNode=1,targetNozzlePerNode=1,GROUP=P0;memory;nozzle
    test_memory_footprint_baseline,doc_size_bytes=1024,num_docs=10000,dcpFlowControlThrottle=50,sourceNozzlePerNode=4,targetNozzlePerNode=4,GROUP=P0;memory;nozzle
    test_memory_footprint_baseline,doc_size_bytes=1024,num_docs=10000,dcpFlowControlThrottle=50,sourceNozzlePerNode=8,targetNozzlePerNode=8,GROUP=P0;memory;nozzle

    # Checkpoint interval and batch size variations (Section 4.4)
    test_memory_footprint_baseline,doc_size_bytes=1024,num_docs=10000,dcpFlowControlThrottle=50,checkpointInterval=60,workerBatchSize=500,GROUP=P0;memory;batch
    test_memory_footprint_baseline,doc_size_bytes=1024,num_docs=10000,dcpFlowControlThrottle=50,checkpointInterval=300,workerBatchSize=5000,GROUP=P0;memory;batch

    # Large document memory footprint (Section 4.7)
    test_memory_footprint_baseline,doc_size_bytes=1048576,num_docs=100,dcpFlowControlThrottle=50,GROUP=P0;memory;large_docs
    test_memory_footprint_baseline,doc_size_bytes=1048576,num_docs=100,dcpFlowControlThrottle=25,GROUP=P0;memory;large_docs

############################################################################################
# SECTION 5: Backfill Pipeline Handling [P0]
############################################################################################

    # Backfill with minimal settings
    test_backfill_with_low_settings,num_docs=5000,dcpFlowControlThrottle=10,componentEventsChanLength=1000,GROUP=P0;backfill
    test_backfill_with_low_settings,num_docs=5000,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P0;backfill

############################################################################################
# SECTION 7: Persistence of Settings [P0]
############################################################################################

    # goxdcr process crash
    test_settings_persistence_goxdcr_crash,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P0;persistence
    test_settings_persistence_goxdcr_crash,dcpFlowControlThrottle=25,componentEventsChanLength=2500,GROUP=P0;persistence

    # Service restart
    test_settings_persistence_service_restart,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P0;persistence
    test_settings_persistence_service_restart,dcpFlowControlThrottle=25,componentEventsChanLength=2500,GROUP=P0;persistence

############################################################################################
# SECTION 8: High Mutation Rate with CRUD Operations [P1]
############################################################################################

    test_crud_load_with_throttle,num_docs=10000,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;mutation
    test_crud_load_with_throttle,num_docs=10000,dcpFlowControlThrottle=25,componentEventsChanLength=2500,GROUP=P1;mutation
    test_crud_load_with_throttle,num_docs=10000,dcpFlowControlThrottle=10,componentEventsChanLength=1000,GROUP=P1;mutation

############################################################################################
# SECTION 9: Pause and Resume Replication [P1]
############################################################################################

    test_pause_resume_with_throttle,num_docs=5000,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;pause_resume
    test_pause_resume_with_throttle,num_docs=5000,dcpFlowControlThrottle=25,componentEventsChanLength=2500,GROUP=P1;pause_resume

############################################################################################
# SECTION 4.2: Full TLS Tests [P0]
############################################################################################

xdcr.secureXDCR.XDCRSecurityTests:

    test_xdcr_with_security,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P0;tls

############################################################################################
# SECTION 6: Priority Replications [P1]
############################################################################################

xdcr.prioritizationXDCR.XDCRPrioritization:

    test_priority,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;priority
    test_priority_change_10k_collections,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;priority

############################################################################################
# SECTION 9.2: Compression with Pause/Resume [P1]
############################################################################################

xdcr.compressionXDCR.compression:

    test_compression_with_unixdcr_incr_load,standard_buckets=2,compression_type=None,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;compression
    test_compression_with_unixdcr_incr_load,standard_buckets=2,compression_type=Snappy,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;compression
    test_compression_with_pause_resume,standard_buckets=2,compression_type=None,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;compression

############################################################################################
# SECTION 10: Topology Tests [P1]
############################################################################################

xdcr.xdcrTopologyTests.XDCRTopologyTest:

    # Chain topology A->B->C
    test_topology_chain_10k_collections,chain_length=3,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;topology

    # Star topology
    test_topology_star_10k_collections,chain_length=3,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;topology

############################################################################################
# SECTION 11: Crash/Recovery and Rebalance [P1]
############################################################################################

xdcr.rebalanceXDCR.Rebalance:

    test_rebalance_10k_collections,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;rebalance
    test_failover_10k_collections,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;failover

############################################################################################
# SECTION 3.3: Advanced Filtering with Low Throttle [P1]
############################################################################################

xdcr.advFilteringXDCR.XDCRAdvFilterTests:

    test_xdcr_with_filter,items=10000,rdirection=unidirection,ctopology=chain,replication_type=xmem,default@C1=filter_expression:REGEXP_CONTAINS(META()dotidcomma'^1'),dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;filter
    test_xdcr_with_filter_for_binary,items=10000,rdirection=unidirection,ctopology=chain,replication_type=xmem,default@C1=filter_expression:REGEXP_CONTAINS(META()dotidcomma'^1'),filter_binary:True,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;filter

############################################################################################
# SECTION 10K Collections Scale Tests
############################################################################################

xdcr.memoryTestXDCR.MemoryTestXDCR:

    test_memory_throttling_10k_collections,num_scopes=100,collections_per_scope=100,sample_collections=200,docs_per_collection=5,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;10k
    test_memory_throttling_10k_collections,num_scopes=100,collections_per_scope=100,sample_collections=200,docs_per_collection=5,dcpFlowControlThrottle=25,componentEventsChanLength=2500,GROUP=P1;10k

    test_verify_no_goxdcr_crashes_10k_collections,num_scopes=100,collections_per_scope=100,sample_collections=200,docs_per_collection=5,dcpFlowControlThrottle=25,componentEventsChanLength=2500,GROUP=P0;10k
    test_verify_no_goxdcr_crashes_10k_collections,num_scopes=100,collections_per_scope=100,sample_collections=200,docs_per_collection=50,dcpFlowControlThrottle=10,componentEventsChanLength=1000,GROUP=P0;10k

############################################################################################
# Pause/Resume from pauseResumeXDCR [P1]
############################################################################################

xdcr.pauseResumeXDCR.PauseResumeTest:

    test_pause_resume_cycles_checkpoint_10k,dcpFlowControlThrottle=50,componentEventsChanLength=5000,GROUP=P1;pause_resume

############################################################################################
# Mid-Replication Updates (per-replication scope) [P1]
# Valid: update succeeds, heap trend sampled, replication completes
# Invalid: update rejected, replication continues unaffected
############################################################################################

xdcr.memoryTestXDCR.MemoryTestXDCR:

    # dcpFlowControlThrottle - valid mid-run update (100 -> 25)
    test_update_dcp_flow_control_throttle_mid_replication,dcpFlowControlThrottle=100,update_to=25,num_docs=50000,heap_sample_duration_s=60,heap_sample_interval_s=5,GROUP=P1;mid_update

    # dcpFlowControlThrottle - invalid mid-run update (100 -> 0, rejected)
    test_update_dcp_flow_control_throttle_mid_replication,dcpFlowControlThrottle=100,update_to=0,num_docs=50000,heap_sample_duration_s=30,heap_sample_interval_s=5,GROUP=P1;mid_update

    # componentEventsChanLength - valid mid-run update (10000 -> 2500)
    test_update_component_events_chan_length_mid_replication,componentEventsChanLength=10000,update_to=2500,num_docs=50000,heap_sample_duration_s=60,heap_sample_interval_s=5,GROUP=P1;mid_update

    # componentEventsChanLength - invalid mid-run update (10000 -> 500, rejected)
    test_update_component_events_chan_length_mid_replication,componentEventsChanLength=10000,update_to=500,num_docs=50000,heap_sample_duration_s=30,heap_sample_interval_s=5,GROUP=P1;mid_update

    # Atomic combined update - valid (100->25, 10000->2500 in single REST call)
    test_update_both_throttle_params_mid_replication,dcpFlowControlThrottle=100,componentEventsChanLength=10000,update_to_dcp=25,update_to_events=2500,num_docs=50000,heap_sample_duration_s=60,heap_sample_interval_s=5,GROUP=P1;mid_update;atomic

    # Atomic combined update - invalid (dcp=0 out of range; both must remain unchanged)
    test_update_both_throttle_params_mid_replication,dcpFlowControlThrottle=100,componentEventsChanLength=10000,update_to_dcp=0,update_to_events=2500,num_docs=50000,heap_sample_duration_s=30,heap_sample_interval_s=5,GROUP=P1;mid_update;atomic
