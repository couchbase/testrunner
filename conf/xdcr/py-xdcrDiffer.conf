# XDCR Differ At-Rest Encryption Support Tests
# Reference: Test Plan for XDCR Differ Encryption Support

xdcr.xdcrDiffer.XDCRDifferTest:
    # =========================================================================
    # CLI Interface Tests (TC-001 to TC-004)
    # =========================================================================
    test_cli_encryption_passphrase_without_log_file,rdirection=unidirection,ctopology=chain
    test_cli_encrypted_log_file_without_passphrase,rdirection=unidirection,ctopology=chain
    test_cli_decrypt_without_passphrase,rdirection=unidirection,ctopology=chain
    test_cli_help_documentation,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # File Encryption Tests (TC-005 to TC-008)
    # =========================================================================
    test_file_encryption_enc_suffix,rdirection=unidirection,ctopology=chain
    test_file_encryption_no_plaintext,rdirection=unidirection,ctopology=chain
    test_file_encryption_magic_bytes,rdirection=unidirection,ctopology=chain
    test_file_encryption_size_increase,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # Passphrase Security Tests (TC-009 to TC-011)
    # =========================================================================
    test_passphrase_empty_rejection,rdirection=unidirection,ctopology=chain
    test_passphrase_mismatch,rdirection=unidirection,ctopology=chain
    test_passphrase_special_characters,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # Decryption Tests (TC-012 to TC-015)
    # =========================================================================
    test_decryption_matches_original,rdirection=unidirection,ctopology=chain
    test_decryption_wrong_passphrase,rdirection=unidirection,ctopology=chain
    test_decryption_stdout_only,rdirection=unidirection,ctopology=chain
    test_decryption_all_phases,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # Integration Tests (TC-016 to TC-019)
    # =========================================================================
    test_integration_full_workflow,rdirection=unidirection,ctopology=chain
    test_integration_encrypted_checkpoints,rdirection=unidirection,ctopology=chain
    test_integration_encrypted_logs,rdirection=unidirection,ctopology=chain
    test_integration_encrypted_mutation_diff,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # Performance Tests (TC-020 to TC-023)
    # =========================================================================
    test_performance_execution_time,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # Security Validation Tests (TC-024 to TC-027)
    # =========================================================================
    test_security_wrong_passphrase,rdirection=unidirection,ctopology=chain
    test_security_tampered_file,rdirection=unidirection,ctopology=chain
    test_security_temp_files_encrypted,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # Fault Tolerance Tests (TC-028 to TC-033)
    # =========================================================================
    test_fault_tolerance_corrupted_files,rdirection=unidirection,ctopology=chain
    test_fault_tolerance_checkpoint_recovery,rdirection=unidirection,ctopology=chain
    test_fault_tolerance_rebalance,rdirection=unidirection,ctopology=chain
    test_fault_tolerance_failover,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # Regression Tests (TC-042, TC-043)
    # =========================================================================
    test_regression_non_encrypted_mode,rdirection=unidirection,ctopology=chain
    test_regression_mixed_mode,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # Checkpoint Resume Tests (TC-047 to TC-051)
    # =========================================================================
    test_checkpoint_resume_same_passphrase,rdirection=unidirection,ctopology=chain
    test_checkpoint_resume_new_passphrase,rdirection=unidirection,ctopology=chain
    test_checkpoint_resume_wrong_passphrase,rdirection=unidirection,ctopology=chain

    # =========================================================================
    # Large Volume Tests (TC-LARGE01)
    # =========================================================================
    test_xdcr_differ_large_volume_100k_docs,largeDocCount=100000,rdirection=unidirection,ctopology=chain
    test_xdcr_differ_large_volume_100k_docs,largeDocCount=1000000,ctopology=chain,rdirection=bidirection
    test_xdcr_differ_large_volume_100k_docs,largeDocCount=4000000,ctopology=ring,rdirection=unidirection

    # =========================================================================
    # Topology Tests (TC-039 to TC-041)
    # =========================================================================
    test_integration_full_workflow,rdirection=unidirection,ctopology=star
    test_integration_full_workflow,rdirection=unidirection,ctopology=ring
    test_integration_full_workflow,rdirection=bidirection,ctopology=chain

    # =========================================================================
    # Basic Backward Compatibility Test
    # =========================================================================
    test_xdcr_differ,rdirection=unidirection,ctopology=chain
    test_xdcr_differ,rdirection=unidirection,ctopology=chain,encryptionPassphrase=secret
