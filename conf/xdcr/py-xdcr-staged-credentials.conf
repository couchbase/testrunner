xdcr.stagedCredentialsXDCR.StagedCredentialsXDCR:

    # Basic credential staging and rotation
    # Stage credentials, invalidate primary, verify auto-rotation
    test_stage_credentials_and_rotate,items=10000,rdirection=unidirection,ctopology=chain,GROUP=P0;CHAIN;staged
    test_stage_credentials_and_rotate,items=10000,rdirection=bidirection,ctopology=chain,GROUP=P0;CHAIN;staged

    # Multiple topologies - test with bidirectional replication
    # Test staging across multiple remote cluster references
    test_stage_credentials_multiple_topologies,items=5000,rdirection=unidirection,ctopology=chain,GROUP=P1;CHAIN;staged
    test_stage_credentials_multiple_topologies,items=5000,rdirection=bidirection,ctopology=chain,GROUP=P1;CHAIN;staged

    # High load testing
    # Stage credentials while source is under heavy load
    test_stage_credentials_under_high_load,items=50000,rdirection=unidirection,ctopology=chain,GROUP=P1;CHAIN;load;staged

    # Rapid credential changes
    # Verify POST overwrites work correctly with rapid changes
    test_stage_credentials_rapid_changes,items=5000,rdirection=unidirection,ctopology=chain,GROUP=P1;CHAIN;staged

    # Validation tests
    # Test correct/incorrect payloads
    test_stage_credentials_validation,items=5000,rdirection=unidirection,ctopology=chain,GROUP=P0;CHAIN;staged

    # Retrieval tests
    # Verify staged credentials can be retrieved correctly
    test_retrieve_staged_credentials,items=5000,rdirection=unidirection,ctopology=chain,GROUP=P0;CHAIN;staged

    # Mutual exclusion - username/password vs client cert/key
    test_mutual_exclusion_credentials_certs,items=5000,rdirection=unidirection,ctopology=chain,GROUP=P1;CHAIN;staged

    # Error cases - incorrect staged credentials
    test_incorrect_staged_credentials,items=10000,rdirection=unidirection,ctopology=chain,GROUP=P1;CHAIN;staged

    # Role change during staging
    test_role_change_during_staging,items=10000,rdirection=unidirection,ctopology=chain,GROUP=P0;CHAIN;staged
    test_role_change_during_staging,items=10000,rdirection=bidirection,ctopology=chain,GROUP=P1;CHAIN;staged

    # Both credentials invalid
    test_both_credentials_invalid,items=10000,rdirection=unidirection,ctopology=chain,GROUP=P1;CHAIN;staged

    # Process restart tests
    # Kill goxdcr and verify credentials persist
    test_goxdcr_restart_after_staging,items=10000,rdirection=unidirection,ctopology=chain,GROUP=P0;CHAIN;staged

    # Security tests
    # Verify no plain text passwords in logs
    test_no_plaintext_passwords_in_logs,items=5000,rdirection=unidirection,ctopology=chain,GROUP=P0;CHAIN;security;staged

    # ECCV compatibility tests
    # Verify staged credentials work with cross-cluster versioning
    test_staged_credentials_with_eccv,items=10000,rdirection=unidirection,ctopology=chain,GROUP=P1;CHAIN;eccv;staged
    test_staged_credentials_with_eccv,items=10000,rdirection=bidirection,ctopology=chain,GROUP=P1;CHAIN;eccv;staged
