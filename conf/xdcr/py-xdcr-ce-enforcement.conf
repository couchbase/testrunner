# [CBQE-8900] XDCR CE enforcement.
# .ini: 2 clusters (C1, C2), both CE initially. Suite order matters:
#   A. Strict CE  -- both stay CE
#   B. Backdoor   -- sets ns_config flag (persists rest of suite)
#   C. EE-side    -- upgrades one cluster CE->EE; T2 reuses with src/dest swap
# After C, re-provision the lab to reset to all-CE.
xdcr.ceEnforcementXDCR.CEEnforcementXDCRTests:
    # A: strict CE
    test_ce_to_ce_replication_is_rejected,items=100,ctopology=chain,rdirection=unidirection,GROUP=P0
    test_ce_to_ce_via_couchbase_cli_reports_error,GROUP=P0
    test_mixed_source_cluster_enforces_when_any_node_is_enforced_ce,GROUP=P0
    test_mixed_destination_cluster_enforces_when_any_node_is_enforced_ce,GROUP=P0
    test_ce_enforcement_error_message_is_actionable,items=10,GROUP=P0
    # B: backdoor (cluster flag-tainted for rest of suite)
    test_backdoor_allows_ce_to_ce_replication,items=10000,ctopology=chain,rdirection=unidirection,GROUP=P0
    test_backdoor_persists_across_goxdcr_kill,items=10000,ctopology=chain,rdirection=unidirection,GROUP=P0
    test_forced_ce_to_ce_replication_autopauses_with_ce_error,items=100,post_pause_items=1000,ctopology=chain,rdirection=unidirection,GROUP=P0
    test_dest_only_ce_to_ee_upgrade_resumes_paused_replication,items=1000,ctopology=chain,rdirection=unidirection,GROUP=P0
    test_ce_to_ee_replication_succeeds,items=10000,ctopology=chain,rdirection=unidirection,GROUP=P1
    test_bidirectional_ce_ee_replication_succeeds,items=10000,ctopology=chain,rdirection=bidirection,GROUP=P1
    test_ee_to_ce_replication_succeeds,items=10000,ctopology=chain,rdirection=unidirection,GROUP=P1
