xdcr.cngXDCR.XDCRCNGTopologyTests:

    # ---------------------------------------------------------------- #
    # Topology tests — require b/resources/12-nodes-template-cng-xdcr.ini
    # (3 clusters of 2 nodes + 3 LBs + 3 spare floating for rebalance)
    # ---------------------------------------------------------------- #

    # Chain: C1 -> CNG(C2) -> CNG(C3)
    test_cng_topology_chain,items=2000,rdirection=unidirection,ctopology=chain,replication_type=xmem,GROUP=P0

    # Star: C1 hub -> CNG(C2), CNG(C3); unidirectional
    test_cng_topology_star,items=2000,rdirection=unidirection,ctopology=star,replication_type=xmem,GROUP=P0

    # Star bidirectional: hub + spokes all send to each other through CNG
    test_cng_topology_star,items=2000,bidirectional=True,rdirection=bidirection,ctopology=star,replication_type=xmem,GROUP=P1

    # Ring: C1 -> CNG(C2) -> CNG(C3) -> CNG(C1)
    test_cng_topology_ring,items=2000,rdirection=unidirection,ctopology=ring,replication_type=xmem,GROUP=P0

    # Mesh: full bidirectional mesh across C1/C2/C3 through CNG gateways
    test_cng_topology_mesh,items=1000,rdirection=bidirection,ctopology=hybrid,hybrid=C1<>C2<>C3<>C1,replication_type=xmem,GROUP=P1
    