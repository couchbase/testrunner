# Iceberg integration tests for N1QL queries over external Iceberg tables
# Requires AWS/GCP credentials configured via environment variables or test params

# AWS Glue Catalog tests
tuqquery.tuq_iceberg.IcebergQueryTests:
    test_iceberg_select_count,catalog_type=AWS_GLUE,default_bucket=False,GROUP=ICEBERG;AWS_GLUE;P0
    test_iceberg_select_projection,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P0
    test_iceberg_select_filter,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P0
    test_iceberg_select_reviews_array,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P0
    test_iceberg_queries_from_file,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_select_reviews_nested_list_template,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_select_star_nested_structure,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P0
    test_iceberg_alter_catalog_invalid_credentials,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_drop_order_dependencies,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_null_values,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_diverse_datatypes,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_schema_evolution,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_mixed_types,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_join_different_bucket,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_join_same_bucket_different_scope,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1
    test_iceberg_join_same_bucket_same_scope,catalog_type=AWS_GLUE,GROUP=ICEBERG;AWS_GLUE;P1

